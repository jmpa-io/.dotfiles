# https://starship.rs/config

add_newline = false

# Explicitly define the prompt format - anything not listed here won't show.
# This is cleaner than disabling every language module individually.
format = """
$directory$git_branch$git_commit$git_status$cmd_duration
$time$character"""

[character]
success_symbol = "[->](green)"
error_symbol = "[-X](red)"

[cmd_duration]
min_time = 1_000

[directory]
truncation_symbol = ""
home_symbol = "~"
format = "[$path]($style)[$read_only]($read_only_style) "

[time]
disabled = false
format = "[$time]($style) "
time_format = "%H:%M:%S"
style = "dimmed white"
