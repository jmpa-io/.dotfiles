# ── General ───────────────────────────────────────────────────────────────────

# Use Ctrl+A as prefix (easier to reach than Ctrl+B)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Enable mouse support
set -g mouse on

# Increase scrollback buffer
set -g history-limit 10000

# No delay for escape key
set -sg escape-time 0

# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ── Splits ────────────────────────────────────────────────────────────────────

# Split panes with | and - (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# ── Navigation ────────────────────────────────────────────────────────────────

# Switch panes with Alt+arrow (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Switch windows with Shift+arrow (no prefix needed)
bind -n S-Left previous-window
bind -n S-Right next-window

# ── Copy mode ─────────────────────────────────────────────────────────────────

# Vi-style copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Appearance ────────────────────────────────────────────────────────────────

# 256 colour + true colour support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Status bar position
set -g status-position bottom
set -g status-interval 5

# Status bar colours
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'

# Left: session name
set -g status-left '#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]'
set -g status-left-length 30

# Right: date + time
set -g status-right '#[fg=#6c7086]%a %d %b #[fg=#cdd6f4,bold]%H:%M'
set -g status-right-length 30

# Window tabs
set -g window-status-format ' #I:#W '
set -g window-status-current-format '#[bg=#313244,fg=#89b4fa,bold] #I:#W '

# Pane borders
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'

# Message style
set -g message-style 'bg=#89b4fa fg=#1e1e2e bold'
