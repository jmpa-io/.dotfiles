# ── General ───────────────────────────────────────────────────────────────────

# Use Ctrl+B as prefix (default — no conflicts on macOS)
set -g prefix C-b
bind C-b send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Enable mouse support
set -g mouse on

# Increase scrollback buffer
set -g history-limit 50000

# No delay for escape key
set -sg escape-time 0

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Remove stale bindings
unbind ?

# ── Splits (no prefix needed) ─────────────────────────────────────────────────

bind -n C-\\ split-window -h -c "#{pane_current_path}"   # Ctrl+\  → split right
bind -n C-g  split-window -v -c "#{pane_current_path}"   # Ctrl+G  → split down
unbind '"'
unbind %

# Keep prefix versions too
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# ── Navigation (no prefix needed) ─────────────────────────────────────────────

bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

bind -n S-Left  previous-window
bind -n S-Right next-window

# ── Pane sync ─────────────────────────────────────────────────────────────────

# Ctrl+B y — toggle sync (type in all panes at once, useful for homelab multi-server)
bind y setw synchronize-panes \; display "Pane sync: #{?pane_synchronized,ON,OFF}"

# ── Floating scratchpad ───────────────────────────────────────────────────────

# Ctrl+B t — summon/dismiss a floating terminal popup
bind t display-popup -E -w 80% -h 75% -x C -y C \
  "tmux new-session -A -s scratch"

# ── Session switcher (fzf) ────────────────────────────────────────────────────

# Ctrl+B s — fuzzy switch between sessions
bind s display-popup -E -w 40 -h 20 \
  "tmux list-sessions -F '#{session_name}' | fzf --prompt='session: ' \
   --color='bg:#282a36,fg:#f8f8f2,border:#bd93f9,prompt:#bd93f9,pointer:#ff79c6,hl:#50fa7b' \
   --border=rounded | xargs tmux switch-client -t"

# ── Copy mode ─────────────────────────────────────────────────────────────────

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Clipboard ─────────────────────────────────────────────────────────────────

# Paste from macOS clipboard with Ctrl+B p
bind p run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# ── Appearance ────────────────────────────────────────────────────────────────

# 256 colour + true colour support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Plugins ───────────────────────────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Dracula
set -g @dracula-show-powerline true
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g @dracula-plugins "time"
set -g @dracula-time-format "%a %d %b %H:%M"
set -g @dracula-show-timezone false

# Resurrect — save and restore sessions across reboots
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum — auto-save every 15 minutes, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'
