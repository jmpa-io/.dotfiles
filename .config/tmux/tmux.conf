# ── General ───────────────────────────────────────────────────────────────────

# Use Ctrl+B as prefix (default — no conflicts on macOS)
set -g prefix C-b
bind C-b send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Enable mouse support
set -g mouse on

# Increase scrollback buffer
set -g history-limit 10000

# No delay for escape key
set -sg escape-time 0

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ── Splits (no prefix needed) ─────────────────────────────────────────────────

bind -n C-\\ split-window -h -c "#{pane_current_path}"   # Ctrl+\  → split right
bind -n C-g  split-window -v -c "#{pane_current_path}"   # Ctrl+G  → split down
unbind '"'
unbind %

# Keep prefix versions too
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# ── Navigation (no prefix needed) ─────────────────────────────────────────────

bind -n M-Left  select-pane -L   # Alt+← → pane left
bind -n M-Right select-pane -R   # Alt+→ → pane right
bind -n M-Up    select-pane -U   # Alt+↑ → pane up
bind -n M-Down  select-pane -D   # Alt+↓ → pane down

bind -n S-Left  previous-window  # Shift+← → previous window
bind -n S-Right next-window      # Shift+→ → next window

# ── Copy mode ─────────────────────────────────────────────────────────────────

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Appearance ────────────────────────────────────────────────────────────────

# 256 colour + true colour support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Plugins ───────────────────────────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dracula/tmux'

# Dracula config
set -g @dracula-show-powerline true
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g @dracula-plugins "time"
set -g @dracula-time-format "%a %d %b %H:%M"
set -g @dracula-show-timezone false

run '~/.tmux/plugins/tpm/tpm'
